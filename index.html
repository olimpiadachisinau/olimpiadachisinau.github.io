<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olimpiade Școlare Chișinău</title>
<style>
/* ===== HEADER ===== */
header {
    background: linear-gradient(90deg, #002147, #00509e);
    color: white;
    padding: 20px 40px;
}

header h1 {
    margin: 0;
    font-size: 28px;
    cursor: pointer;
}

/* ===== NAVBAR ===== */
nav {
    background: #003366;
    padding: 10px 40px;
}

nav a {
    color: white;
    margin-right: 20px;
    text-decoration: none;
    font-weight: 500;
    position: relative;
    transition: 0.3s;
}

/* Hover underline */
nav a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -3px;
    left: 0;
    background: white;
    transition: width 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* Theme toggle icon */
.theme-toggle {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(90deg, white 50%, black 50%);
    border: 1px solid white;
    cursor: pointer;
    margin-left: 20px;
}

/* RESPONSIVE */
@media(max-width: 768px) {
    nav a {
        display: block;
        margin: 10px 0;
    }
    .theme-toggle { margin-left: 0; margin-top: 10px; }
}
</style>
</head>
<body>

<header>
    <h1 onclick="location.href='index.html'">Olimpiade Școlare din municipiu Chișinău</h1>
</header>

<nav>
    <a href="discipline.html">Discipline</a>
    <a href="noutati.html">Noutăți</a>
    <a href="clasament.html">Clasament</a>
    <a href="regulament.html">Regulament</a>
    <div class="theme-toggle" onclick="document.body.classList.toggle('dark')"></div>
</nav>

</body>
</html>
